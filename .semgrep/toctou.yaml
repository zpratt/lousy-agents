rules:
  - id: toctou-exists-sync-read
    pattern-either:
      - pattern: |
          if ($FS.existsSync($PATH)) {
            ...
            $FS.readFileSync($PATH, ...)
            ...
          }
      - pattern: |
          while ($FS.existsSync($PATH)) {
            ...
            $FS.readFileSync($PATH, ...)
            ...
          }
    message: >
      TOCTOU race condition: a file-existence check (`existsSync`) followed by a
      read (`readFileSync`) is not atomic. Another process can delete or replace
      the file between the check and the read. Use `readFileSync` inside a
      `try/catch` block instead.
    languages:
      - typescript
      - javascript
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-367: Time-Of-Check Time-Of-Use (TOCTOU) Race Condition"
      known-limitation: >
        This rule matches `if` and `while` blocks where the exact same
        expression appears in both `existsSync` and `readFileSync`. Paths
        that are reassigned or reconstructed via `path.join()`/`path.resolve()`
        between the two calls will not be detected. Logical-AND short-circuits
        (`existsSync(p) && readFileSync(p)`) and ternary forms are also out
        of scope. Mixed import styles — namespace `fs.existsSync` paired with
        a destructured `readFileSync`, or vice versa — are not detected because
        the `$FS` metavariable must resolve identically in both calls.
        Use `try/catch` around `readFileSync` as the authoritative fix regardless.

  - id: avoid-exists-sync
    pattern: $FS.existsSync(...)
    message: >
      `existsSync` is a blocking call that can introduce TOCTOU
      (Time-Of-Check Time-Of-Use) race conditions. Use `readFileSync` inside a
      `try/catch` block instead — `fs.promises.access` is also a check-then-act
      pattern and does not eliminate the race window.
    languages:
      - typescript
      - javascript
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-367: Time-Of-Check Time-Of-Use (TOCTOU) Race Condition"
      known-limitation: >
        Coverage of standalone destructured `existsSync()` calls (named imports
        without a namespace prefix) depends on semgrep import-aware analysis
        available in 1.162.0+. Upgrading semgrep may silently change whether
        these forms are detected. The rule is verified against both call forms
        in `.semgrep/toctou.ts` — run `semgrep scan --test` after any semgrep
        upgrade to confirm coverage is intact.
