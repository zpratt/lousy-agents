---
name: Update Demo GIFs

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup mise
        # v3.6.1
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4
        with:
          github_token: ${{ github.token }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Link CLI for demo
        run: npm link

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate demo.gif
        # v2.1.0
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3
        with:
          path: demo.tape
          install-fonts: false

      - name: Generate new-copilot-agent.gif
        # v2.1.0
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3
        with:
          path: new-copilot-agent.tape
          install-fonts: false

      - name: Commit and push updated demo GIFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          changed_files=""
          if [[ -n $(git status --porcelain media/demo.gif) ]]; then
            git add media/demo.gif
            changed_files="demo.gif"
          fi
          if [[ -n $(git status --porcelain media/new-copilot-agent.gif) ]]; then
            git add media/new-copilot-agent.gif
            if [[ -n "$changed_files" ]]; then
              changed_files="$changed_files, new-copilot-agent.gif"
            else
              changed_files="new-copilot-agent.gif"
            fi
          fi

          if [[ -n "$changed_files" ]]; then
            git commit -m "chore: update $changed_files [skip ci]"
            git push
          else
            echo "No changes to demo GIFs"
          fi
