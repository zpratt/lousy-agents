---
name: Release

'on':
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read # for checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on main repository, not forks, and only if CI succeeded
    if: >
      github.repository == 'zpratt/lousy-agents' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write # to create GitHub releases
      issues: write # to comment on released issues
      pull-requests: write # to comment on released PRs
      id-token: write # for npm trusted publishing (OIDC)
      attestations: write # for build provenance attestation

    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        # v3.6.1
        uses: jdx/mise-action@b106a2f3b6c5fe71d9bc58fef0e8284fcd2b9f70
        with:
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        # v5.0.3
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Verify package integrity
        run: npm audit signatures

      - name: Build
        run: mise run build

      - name: Attest build provenance
        # v4.1.0
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275
        with:
          subject-path: 'packages/*/dist/**/*'

      - name: Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release@25.0.2
