---
name: CI

'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  # Separate job from ci because it requires checks: write for reviewdog annotations.
  # Keeping it isolated avoids granting elevated permissions to the main ci job.
  lint-review:
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup mise
        # v3.6.1
        uses: jdx/mise-action@1c992c2b17638065c8d3f9973853aeea39f52576
        with:
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build --workspace=packages/action

      - name: Lint with reviewdog
        uses: ./
        with:
          github_token: ${{ github.token }}

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup mise
        # v3.6.1
        uses: jdx/mise-action@1c992c2b17638065c8d3f9973853aeea39f52576
        with:
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Check package signatures
        run: npm audit signatures

      - name: Run linting
        run: mise run lint

      - name: Run tests
        run: mise run test

      - name: Build project
        run: mise run build

      - name: Run integration tests
        run: npm run test:integration

      - name: Test init command (as node)
        run: node packages/cli/dist/index.js init

      - name: Test init command (as standalone CLI)
        run: ./packages/cli/dist/index.js init

      - name: Test npx compatibility (via npm link)
        run: |
          npm link --workspace=packages/cli
          lousy-agents init

      - name: Smoke test - init --kind api
        run: |
          rm -rf /tmp/smoke-test-api
          mkdir -p /tmp/smoke-test-api
          cd /tmp/smoke-test-api
          lousy-agents init --kind api --name test-api
          test -f package.json
          test -f tsconfig.json
          test -d .github
          test -f .github/instructions/test.instructions.md
          git init
          npm install
          npm test
          npm run test:integration
          npm run lint
          echo "API smoke test passed"

      - name: Smoke test - init --kind webapp
        run: |
          rm -rf /tmp/smoke-test-webapp
          mkdir -p /tmp/smoke-test-webapp
          cd /tmp/smoke-test-webapp
          lousy-agents init --kind webapp --name test-webapp
          test -f package.json
          test -f tsconfig.json
          test -d .github
          test -f .github/instructions/test.instructions.md
          npm install
          echo "Webapp smoke test passed"

      - name: Smoke test - lint --skills (valid skill)
        run: |
          rm -rf /tmp/smoke-test-lint-valid
          mkdir -p /tmp/smoke-test-lint-valid/.github/skills/my-skill
          printf '%s\n' '---' 'name: my-skill' 'description: A valid test skill' 'allowed-tools: tool1' '---' '' '# my-skill' > /tmp/smoke-test-lint-valid/.github/skills/my-skill/SKILL.md
          cd /tmp/smoke-test-lint-valid
          lousy-agents lint --skills
          echo "Lint valid skill smoke test passed"

      - name: Smoke test - lint --skills (invalid skill exits non-zero)
        run: |
          rm -rf /tmp/smoke-test-lint-invalid
          mkdir -p /tmp/smoke-test-lint-invalid/.github/skills/bad-skill
          printf '%s\n' '---' 'description: Missing name field' '---' '' '# bad-skill' > /tmp/smoke-test-lint-invalid/.github/skills/bad-skill/SKILL.md
          cd /tmp/smoke-test-lint-invalid
          if lousy-agents lint --skills; then
            echo "Expected lint to fail but it passed"
            exit 1
          else
            echo "Lint invalid skill correctly failed"
          fi
          echo "Lint invalid skill smoke test passed"

      - name: Smoke test - lint (no flags lints everything)
        run: |
          rm -rf /tmp/smoke-test-lint-empty
          mkdir -p /tmp/smoke-test-lint-empty
          cd /tmp/smoke-test-lint-empty
          lousy-agents lint
          echo "Lint no flags smoke test passed"

      - name: Smoke test - lint --agents (valid agent)
        run: |
          rm -rf /tmp/smoke-test-lint-agent-valid
          mkdir -p /tmp/smoke-test-lint-agent-valid/.github/agents
          printf '%s\n' '---' 'name: my-agent' 'description: A valid test agent' '---' '' '# my-agent' > /tmp/smoke-test-lint-agent-valid/.github/agents/my-agent.md
          cd /tmp/smoke-test-lint-agent-valid
          lousy-agents lint --agents
          echo "Lint valid agent smoke test passed"

      - name: Smoke test - lint --agents (invalid agent exits non-zero)
        run: |
          rm -rf /tmp/smoke-test-lint-agent-invalid
          mkdir -p /tmp/smoke-test-lint-agent-invalid/.github/agents
          printf '%s\n' '---' 'description: Missing name field' '---' '' '# bad-agent' > /tmp/smoke-test-lint-agent-invalid/.github/agents/bad-agent.md
          cd /tmp/smoke-test-lint-agent-invalid
          if lousy-agents lint --agents; then
            echo "Expected lint --agents to fail but it passed"
            exit 1
          else
            echo "Lint --agents invalid agent correctly failed"
          fi
          echo "Lint invalid agent smoke test passed"

      - name: Smoke test - lint --agents (no agents)
        run: |
          rm -rf /tmp/smoke-test-lint-agent-empty
          mkdir -p /tmp/smoke-test-lint-agent-empty
          cd /tmp/smoke-test-lint-agent-empty
          lousy-agents lint --agents
          echo "Lint no agents smoke test passed"

      - name: Smoke test - lint --skills --format json (valid skill)
        run: |
          rm -rf /tmp/smoke-test-lint-json
          mkdir -p /tmp/smoke-test-lint-json/.github/skills/my-skill
          printf '%s\n' '---' 'name: my-skill' 'description: A valid test skill' 'allowed-tools: tool1' '---' '' '# my-skill' > /tmp/smoke-test-lint-json/.github/skills/my-skill/SKILL.md
          cd /tmp/smoke-test-lint-json
          lousy-agents lint --skills --format json
          echo "Lint JSON format smoke test passed"

      - name: Smoke test - lint --instructions (no instruction files)
        run: |
          rm -rf /tmp/smoke-test-lint-instructions-empty
          mkdir -p /tmp/smoke-test-lint-instructions-empty
          cd /tmp/smoke-test-lint-instructions-empty
          lousy-agents lint --instructions
          echo "Lint no instructions smoke test passed"

  action-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup mise
        # v3.6.1
        uses: jdx/mise-action@1c992c2b17638065c8d3f9973853aeea39f52576
        with:
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build --workspace=packages/action

      - name: Smoke test - action runs against valid skill
        shell: bash
        run: |
          SCRIPT="$(pwd)/packages/action/dist/index.js"
          rm -rf /tmp/action-smoke-valid
          mkdir -p /tmp/action-smoke-valid/.github/skills/my-skill
          printf '%s\n' '---' 'name: my-skill' 'description: A valid test skill' \
            'allowed-tools: tool1' '---' '' '# my-skill' \
            > /tmp/action-smoke-valid/.github/skills/my-skill/SKILL.md
          cd /tmp/action-smoke-valid

          INPUT_DIRECTORY="." \
          INPUT_SKILLS="true" \
          INPUT_AGENTS="false" \
          INPUT_INSTRUCTIONS="false" \
          INPUT_REPORTER="github-pr-check" \
          INPUT_FILTER_MODE="added" \
          INPUT_LEVEL="info" \
          DOTENV_CONFIG_QUIET="true" \
          node "$SCRIPT"
          echo "Valid skill smoke test passed"

      - name: Smoke test - action detects invalid skill
        shell: bash
        run: |
          SCRIPT="$(pwd)/packages/action/dist/index.js"
          rm -rf /tmp/action-smoke-invalid
          mkdir -p /tmp/action-smoke-invalid/.github/skills/bad-skill
          printf '%s\n' '---' 'description: Missing name field' '---' '' \
            '# bad-skill' \
            > /tmp/action-smoke-invalid/.github/skills/bad-skill/SKILL.md
          cd /tmp/action-smoke-invalid

          set +e
          INPUT_DIRECTORY="." \
          INPUT_SKILLS="true" \
          INPUT_AGENTS="false" \
          INPUT_INSTRUCTIONS="false" \
          INPUT_REPORTER="github-pr-check" \
          INPUT_FILTER_MODE="added" \
          INPUT_LEVEL="info" \
          DOTENV_CONFIG_QUIET="true" \
          node "$SCRIPT"
          EXIT_CODE=$?
          set -e

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "Expected action to fail but it passed"
            exit 1
          fi
          echo "Invalid skill detection smoke test passed"

      - name: Smoke test - action produces rdjsonl output
        shell: bash
        run: |
          SCRIPT="$(pwd)/packages/action/dist/index.js"
          rm -rf /tmp/action-smoke-rdjsonl
          mkdir -p /tmp/action-smoke-rdjsonl/.github/skills/bad-skill
          printf '%s\n' '---' 'description: Missing name field' '---' '' \
            '# bad-skill' \
            > /tmp/action-smoke-rdjsonl/.github/skills/bad-skill/SKILL.md
          cd /tmp/action-smoke-rdjsonl

          set +e
          OUTPUT=$(INPUT_DIRECTORY="." \
          INPUT_SKILLS="true" \
          INPUT_AGENTS="false" \
          INPUT_INSTRUCTIONS="false" \
          INPUT_REPORTER="github-pr-check" \
          INPUT_FILTER_MODE="added" \
          INPUT_LEVEL="info" \
          DOTENV_CONFIG_QUIET="true" \
          node "$SCRIPT")
          set -e

          echo "$OUTPUT" | head -1 | python3 -c \
            "import sys,json; json.loads(sys.stdin.read())"
          echo "rdjsonl output smoke test passed"

      - name: Smoke test - action lints all targets when no flags set
        shell: bash
        run: |
          SCRIPT="$(pwd)/packages/action/dist/index.js"
          rm -rf /tmp/action-smoke-all
          mkdir -p /tmp/action-smoke-all
          cd /tmp/action-smoke-all

          INPUT_DIRECTORY="." \
          INPUT_SKILLS="false" \
          INPUT_AGENTS="false" \
          INPUT_INSTRUCTIONS="false" \
          INPUT_REPORTER="github-pr-check" \
          INPUT_FILTER_MODE="added" \
          INPUT_LEVEL="info" \
          DOTENV_CONFIG_QUIET="true" \
          node "$SCRIPT"
          echo "All targets smoke test passed"

  update-action-dist:
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
    needs: [ci, action-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      checks: write
    concurrency:
      group: update-action-dist-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout PR head branch
        # v6.0.2
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          persist-credentials: false

      - name: Setup mise
        # v3.6.1
        uses: jdx/mise-action@1c992c2b17638065c8d3f9973853aeea39f52576
        with:
          github_token: ${{ github.token }}

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Rebuild action dist
        run: npm run build --workspace=packages/action

      - name: Warn on dist drift in fork PR
        if: github.event.pull_request.head.repo.fork == true
        shell: bash
        run: |
          if [ -n "$(git status --porcelain packages/action/dist)" ]; then
            echo "::warning::packages/action/dist is stale on this fork PR. Maintainer must rebuild before merge."
          else
            echo "dist is in sync with source"
          fi

      - name: Commit rebuilt dist
        id: commit
        if: github.event.pull_request.head.repo.fork == false
        shell: bash
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain packages/action/dist)" ]; then
            echo "dist is in sync with source, nothing to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/action/dist
          git commit -m "chore(action): rebuild dist"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${PR_HEAD_REF}"
          NEW_SHA=$(git rev-parse HEAD)
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "new_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"

      - name: Publish status check on rebuilt commit
        if: steps.commit.outputs.committed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NEW_SHA: ${{ steps.commit.outputs.new_sha }}
          ORIGINAL_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          summary=$(printf '%s\n' \
            "packages/action/dist/index.js was regenerated by CI." \
            "" \
            "- Source verified at \`${ORIGINAL_SHA}\`" \
            "- Rebuilt dist committed as \`${NEW_SHA}\`" \
            "- Workflow run: ${RUN_URL}" \
            "" \
            "Published by the \`update-action-dist\` job to record that the" \
            "bot-pushed commit on this PR is a deterministic rebuild of" \
            "\`packages/action/dist\` from the source above. The required" \
            "\`status\` check passed against the original commit in the" \
            "same workflow run.")
          jq -n \
            --arg head_sha "${NEW_SHA}" \
            --arg details_url "${RUN_URL}" \
            --arg summary "${summary}" \
            '{
              name: "status",
              head_sha: $head_sha,
              status: "completed",
              conclusion: "success",
              details_url: $details_url,
              output: {
                title: "packages/action/dist rebuilt by CI",
                summary: $summary
              }
            }' \
            | gh api "repos/${GH_REPO}/check-runs" --method POST --input -

  status:
    if: always()
    needs: [lint-review, ci, action-smoke-test, update-action-dist]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Check required jobs passed
        run: |
          ci="${{ needs.ci.result }}"
          smoke="${{ needs.action-smoke-test.result }}"
          lint="${{ needs.lint-review.result }}"
          dist="${{ needs.update-action-dist.result }}"

          if [[ "$ci" != "success" ]]; then
            echo "ci failed: $ci"
            exit 1
          fi
          if [[ "$smoke" != "success" ]]; then
            echo "action-smoke-test failed: $smoke"
            exit 1
          fi
          if [[ "$lint" != "success" && "$lint" != "skipped" ]]; then
            echo "lint-review failed: $lint"
            exit 1
          fi
          if [[ "$dist" != "success" && "$dist" != "skipped" ]]; then
            echo "update-action-dist failed: $dist"
            exit 1
          fi
          echo "All required jobs passed"
