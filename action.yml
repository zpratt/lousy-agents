---
name: 'Lousy Agents Lint'
description: >-
  Lint instructions, agents, and skills via reviewdog. Produces inline
  check annotations (github-pr-check, default) or PR review comments
  (github-pr-review) depending on the reporter input.
  Requires Node.js >= 20 on the runner (included on GitHub-hosted runners).
author: 'zpratt'

inputs:
  github_token:
    description: 'GitHub token for reviewdog API access'
    required: true
  skills:
    description: 'Lint skill frontmatter in .github/skills/'
    required: false
    default: 'false'
  agents:
    description: 'Lint agent frontmatter in .github/agents/'
    required: false
    default: 'false'
  instructions:
    description: 'Lint instruction quality across all instruction file formats'
    required: false
    default: 'false'
  directory:
    description: 'Target directory to lint (defaults to repository root)'
    required: false
    default: '.'
  reporter:
    description: >-
      reviewdog reporter: github-pr-check (default), github-pr-review,
      or github-check
    required: false
    default: 'github-pr-check'
  filter_mode:
    description: >-
      reviewdog filter mode: added (default), diff_context, file, or nofilter
    required: false
    default: 'added'
  level:
    description: 'reviewdog minimum severity level: info, warning, or error'
    required: false
    default: 'info'

runs:
  using: 'composite'
  steps:
    - name: Install reviewdog
      # v1.5.0
      uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f
      with:
        reviewdog_version: 'v0.21.0'

    - name: Run lousy-agents lint
      shell: bash
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_REPORTER: ${{ inputs.reporter }}
        INPUT_FILTER_MODE: ${{ inputs.filter_mode }}
        INPUT_LEVEL: ${{ inputs.level }}
        INPUT_SKILLS: ${{ inputs.skills }}
        INPUT_AGENTS: ${{ inputs.agents }}
        INPUT_INSTRUCTIONS: ${{ inputs.instructions }}
      run: |
        set -euo pipefail

        node "${{ github.action_path }}/packages/action/dist/index.js" | \
          reviewdog -f=rdjsonl \
            -name="lousy-agents-lint" \
            -reporter="$INPUT_REPORTER" \
            -filter-mode="$INPUT_FILTER_MODE" \
            -level="$INPUT_LEVEL"
