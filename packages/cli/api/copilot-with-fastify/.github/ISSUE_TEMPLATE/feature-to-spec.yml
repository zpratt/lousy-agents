---
name: Copilot Feature To Spec
description: Create a spec for the Copilot coding agent.
title: "[Spec]: "
labels: ["copilot-ready", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Copilot Specification
        Please fill out the details below.
        This structure is parsed by the Copilot Agent.

  - type: textarea
    id: context
    attributes:
      label: Context & Goal
      description: What is the goal? What part of the codebase?
      placeholder: |
        We need to add a rate-limiting middleware to the API
        gateway...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will we verify this is done?
      placeholder: |
        I run `npm run dev`.
        I call `POST /api/users` with valid data.
        I see a 201 response with the created user.
    validations:
      required: true

  # ---------------------------------------------------------
  # This section triggers the GitHub Script integration
  # ---------------------------------------------------------
  - type: textarea
    id: extra-instructions
    attributes:
      label: Extra Instructions
      # yamllint disable rule:line-length
      description: >-
        Skill invocation for the agent.
        This will be posted as a comment to guide the bot.
      value: |
        ## MANDATORY — Do not skip this step

        You **MUST** invoke the `feature-to-plan` skill to produce the
        spec for this issue. This is not optional — the skill defines the
        authoritative procedure (Orient → Approval Gate → Create → Validate) and output
        format. Do not attempt to produce the spec manually or deviate
        from the skill's procedure.

        Invoke the skill with this issue number as the argument.

        Failure to use the `feature-to-plan` skill will result in the
        spec being rejected.
      # yamllint enable rule:line-length
    validations:
      required: true
