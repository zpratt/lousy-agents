min_version = "2026.4.1"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node"]

[env]
_.file = '.env'

[hooks]
enter = "mise i -q && npm i"

[tools]
actionlint = "1.7.11"
jq = "1.8.1"
markdownlint-cli2 = "0.22.0"
pipx = "latest"
"pipx:check-jsonschema" = "0.37.1"
shellcheck = "0.11.0"
vhs = "0.11.0"
yamllint = "1.38.0"                # Created with `mise use --pin yamllint`
devcontainer-cli = "0.84.1"

[tasks.yamllint]
description = "Running yamllint locally on all yaml files"
run = "yamllint -c ./.yamllintrc ."
hide = true

[tasks.actionlint]
description = "Running actionlint against GitHub Actions workflows"
run = "actionlint"
hide = true

[tasks.markdownlint]
description = "Running markdownlint against markdown files"
run = "markdownlint-cli2 '**/*.md' '#**/node_modules' '#terraform/.terraform' '#.venv' '#venv'"
hide = true

[tasks.shellcheck]
description = "Running shellcheck against shell scripts"
run = "[ -n \"$(ls -A *.sh 2>/dev/null)\" ] && shellcheck *.sh || echo 'No shell scripts found, skipping shellcheck'"
hide = true

[tasks.check-issue-forms]
description = "Validating GitHub issue form templates against JSON schema"
run = "check-jsonschema --schemafile https://json.schemastore.org/github-issue-forms.json .github/ISSUE_TEMPLATE/*.yml"
hide = true

[tasks.format-check]
description = "Checking code formatting + static analysis"
hide = true
run = "npm run lint"

[tasks.lint]
description = "Run all required linting tools (in parallel)"
run = [
  { tasks = [
    'actionlint',
    'yamllint',
    'markdownlint',
    'shellcheck',
    'check-issue-forms',
    'format-check',
  ] }, # These run in parallel!
]

[tasks.test]
description = "Run unit tests in this project"
run = "npm test"

[tasks.clean]
description = "Clean build artifacts for reproducible builds"
run = "rm -rf packages/cli/dist packages/mcp/dist"

[tasks.build]
description = "Build the project with rspack"
depends = ["clean"]
run = "npm run build"

[tasks.test-integration]
description = "Run smoke tests against the built CLI"
depends = ["build"]
run = "npm run test:integration"

[tasks.smoke-test]
description = "Run smoke tests against the built CLI"
depends = ["build"]
run = [
  "./packages/cli/dist/index.js --help",
  "./packages/cli/dist/index.js init --help",
]

[tasks.ci] # only dependencies to be run
description = 'Run CI tasks'
run = [
  { task = 'lint' },
  { task = 'test' },
  { task = 'test-integration' },
  { task = 'smoke-test' },
]

[tasks.format-fix]
description = "Fixing format issues"
hide = true
run = ["npm run lint:fix"]

[tasks.demo]
description = "Record a demo of lousy-agents using VHS"
run = [
  "npm run build",
  "npm link",
  "rm -rf demo",
  "mkdir -p media",
  "vhs demo.tape",
  "rm -rf demo",
]
